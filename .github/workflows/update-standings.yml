name: Aggiorna dati F1

on:
  schedule:
    # Ogni giorno alle 05:00 UTC (copre gare/sprint del weekend)
    - cron: '0 5 * * *'
  workflow_dispatch: {}   # permette di avviarlo manualmente da GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aggiorna races-data.json con le classifiche correnti
        run: node scripts/update-standings.js

      - name: Aggiorna races-data.json con il calendario stagione
        run: node scripts/update-season.js

      - name: Commit e push (solo se qualcosa è cambiato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add races-data.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica, niente da commitare."
          else
            git commit -m "Aggiorna classifiche e calendario F1 [auto]"
            git push
          fi
